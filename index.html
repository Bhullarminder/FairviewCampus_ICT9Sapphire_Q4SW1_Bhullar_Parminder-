<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEATWORK 1</title> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
     background-color: #f5f5f5;
        }
    </style>
    
</head>
<body>

<div class="container bg-dark text-light p-4 mt-3 mb-4 w-50 text-center rounded">
    <h1>Password Checker</h1>

    <details>
        <summary>Instructions:</summary>
        <p id="instruct"></p>
    </details>

    <input type="password" id="passwordInput" class="form-control w-50 mx-auto mt-3" placeholder="Enter password">

    <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" id="checkboxID">
        <label class="form-check-label">Check Password</label>
    </div>

    <button class="btn btn-light mt-3" onclick="checkPassword()">Submit</button>

    <p id="resultMessage" class="mt-3"></p>
</div>

<script>
    document.getElementById("instruct").innerHTML = 
    "Enter your password and tick the checkbox to validate it.";

    function checkPassword() {
        var isChecked = document.getElementById("checkboxID").checked;
        var password = document.getElementById("passwordInput").value;
        var correctPassword = "12345";

        switch(isChecked) {
            case true:
                if(password === correctPassword) {
                    alert("Correct Password!");
                    document.getElementById("resultMessage").innerHTML = "Access Granted";
                } else {
                    alert("Incorrect Password!");
                    document.getElementById("resultMessage").innerHTML = "Access Denied";
                }
            break;

            case false:
                document.getElementById("resultMessage").innerHTML = "";
            break;
        }
    }
</script>

</body>
</html>
