<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEATWORK 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container bg-dark text-light p-4 mt-3 mb-4 w-50 text-center rounded mx-auto">
    <h1>Password Checker</h1>

    <details>
        <summary>Instructions:</summary>
        <p id="Instruct"></p>
    </details>

    <div class="d-flex justify-content-center mb-3">
        <input class="form-control" style="width: 450px;" type="password" id="password" placeholder="Enter password">
    </div>

    <button class="btn btn-success" onclick="check()">Submit</button>

    <p id="result" class="mt-3"></p>
</div>

<script>
document.getElementById("Instruct").innerHTML = 
"Enter your password to check if it is correct.";

function check(){

    var password = document.getElementById("password").value;
    var result = "";

    switch(true){

        case (password == "12345"):
            result = "Access Granted";
            alert("Correct Password");
        break;

        case (password == ""):
            result = "";
        break;

        default:
            result = "Access Denied";
            alert("Incorrect Password");
        break;
    }

    document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
