<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEATWORK 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container bg-dark text-light p-4 mt-3 mb-4 w-50 text-center rounded mx-auto">
    <h1>Login</h1>

    <details>
        <summary>Instructions:</summary>
        <p id="Instruct"></p>
    </details>
    <div class="d-flex justify-content-center mb-3">
        <input class="form-control" style="width: 450px;" type="text" id="username" placeholder="Enter username">
    </div>

    <div class="d-flex justify-content-center mb-3">
        <input class="form-control" style="width: 450px;" type="password" id="password" placeholder="Enter password">
    </div>

    <button class="btn btn-success me-2" onclick="check()">Login</button>
    <button class="btn btn-danger" onclick="cancel()">Cancel</button>

    <p id="result" class="mt-3"></p>

    <div class="mt-3">
        <a href="#">Forgot username/password?</a>
    </div>
</div>

<script>
document.getElementById("Instruct").innerHTML = 
"Enter your username and password to login.";

function check(){
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;
    var result = "";

    switch(true){
        case (username == "admin" && password == "12345"):
            result = "Access Granted";
            alert("Login Successful");
            break;
        case (username == "" || password == ""):
            result = "";
            alert("Please fill in both fields");
            break;
        default:
            result = "Access Denied";
            alert("Incorrect Username or Password");
            break;
    }

    document.getElementById("result").innerHTML = result;
}

function cancel(){
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
